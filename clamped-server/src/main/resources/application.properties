# Clamped Server Configuration
# DB credentials are loaded from ~/.clamped/config.properties by default.
# Override here or via environment variables (CLAMPED_JDBC_URL, CLAMPED_USERNAME, CLAMPED_PASSWORD).

server.port=8080

# DB credentials are loaded from ~/.clamped/config.properties or CLAMPED_* env vars by DataSourceConfig.java

# Set to true to auto-seed sample data on startup when the table is empty (for hosted demos)
demo.mode=false
